name: 导出全部依赖镜像
on: workflow_dispatch

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取官方镜像
        run: |
          docker pull library/redis:7-alpine
          docker pull library/python:3.12-slim
          docker pull searxng/searxng:latest
          docker save -o redis-7-alpine.tar redis:7-alpine
          docker save -o python-3.12-slim.tar python:3.12-slim
          docker save -o searxng-latest.tar searxng/searxng:latest

      - name: 上传redis包
        uses: actions/upload-artifact@v4
        with:
          name: redis-offline
          path: redis-7-alpine.tar

      - name: 上传python包
        uses: actions/upload-artifact@v4
        with:
          name: python-offline
          path: python-3.12-slim.tar

      - name: 上传searxng包
        uses: actions/upload-artifact@v4
        with:
          name: searxng-offline
          path: searxng-latest.tar
