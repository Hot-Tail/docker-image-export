name: 导出Redis7-Alpine & SearXNG离线镜像
on: workflow_dispatch

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取镜像（中科大国内源，7-alpine轻量版）
        run: |
          docker pull docker.mirrors.ustc.edu.cn/library/redis:7-alpine
          docker pull docker.mirrors.ustc.edu.cn/searxng/searxng:latest
          # 保存为标准tar，标签保留 redis:7-alpine
          docker save -o redis-7-alpine.tar redis:7-alpine
          docker save -o searxng-latest.tar searxng/searxng:latest

      - name: 打包上传离线tar包
        uses: actions/upload-artifact@v4
        with:
          name: docker-offline-images
          paths: |
            redis-7-alpine.tar
            searxng-latest.tar
