name: 导出Redis7-Alpine & SearXNG离线镜像
on: workflow_dispatch

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取官方原版镜像
        run: |
          docker pull library/redis:7-alpine
          docker pull searxng/searxng:latest
          docker save -o redis-7-alpine.tar redis:7-alpine
          docker save -o searxng-latest.tar searxng/searxng:latest

      - name: 打包上传离线tar包
        uses: actions/upload-artifact@v4
        with:
          name: docker-offline-images
          paths: |
            redis-7-alpine.tar
            searxng-latest.tar
